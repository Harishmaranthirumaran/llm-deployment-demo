name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install flake8
      - run: flake8 app.py --max-line-length=120

  dockerfile-lint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          ignore: DL3008,DL3009

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, dockerfile-lint]
    steps:
      - uses: actions/checkout@v4
      - name: Build Streamlit image
        run: docker build -t llm-chat-ui:ci .
      - name: Verify image exists
        run: docker image inspect llm-chat-ui:ci
